name: Build rtl-scan (Windows)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-rtl-sdr
          mingw-w64-x86_64-fftw
          mingw-w64-x86_64-glfw
          mingw-w64-x86_64-make

    - name: Configure
      run: |
        mkdir -p build
        cd build
        cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cd build
        mingw32-make -j2

    - name: Package
      run: |
        mkdir dist
        cp build/*.exe dist/ || true

        # copy required DLLs (important for Windows)
        cp /mingw64/bin/libfftw3f-3.dll dist/ || true
        cp /mingw64/bin/librtlsdr.dll dist/ || true
        cp /mingw64/bin/libglfw3.dll dist/ || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: rtl-scan-windows
        path: dist
